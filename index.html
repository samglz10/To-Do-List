<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Todo List 📌</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <div class="container">
    <div class="card">
      <div id="list-header">
        <div id="list-menu">
          <img src="./assets/menu-white.svg" alt="menu" id="menu" class="hidden" onclick="toggleMenu()" />
          <img src="./assets/cancel.svg" alt="menu" id="menu-cancel" class="visible" onclick="toggleMenu()" />
          <h1>
            To-Do List 📌
          </h1>
          <img src="./assets/gear.svg" alt="settings" id="settings" id="settings" class="visible" />
        </div>
      </div>
      <form id="todo-form">
        <div class="input-container">
          <label for="task">Add a Task:</label>
          <input type="text" name="task" placeholder="Type your task here...
                    " id="inputField" required>
          <label for="due-date">Due Date:</label>
          <input type="date" id="due-date" name="due-date" min="2018-01-01" max="2038-12-31" required>
        </div>
        <div class="input-container">
          <label for="priority-dropdown" class="switch"> Priority:</label>
          <select name="priority-dropdown" id="priority-input">
            <option value="🧊">Low 🧊</option>
            <option value="⚡">Medium ⚡</option>
            <option value="‼️">High ‼️</option>
          </select>
        </div>
        <button id="addBtn">Add</button>
      </form>
      <div id="list-container">
        <div id="taskLists">
          <div class="reload-container">
            <button id="reload-btn" onclick="location.reload()"> ⟳</button>
            <button id="reload-btn" onclick="location.reload()"> ⟳</button>
            <button id="reload-btn" onclick="location.reload()"> ⟳</button>
            <button id="reload-btn" onclick="location.reload()"> ⟳</button>
          </div>
          <!--Todo Lists go here-->
          <table id="todo-table">
            <thead>
              <tr>
                <th>Priority</th>
                <th>Description</th>
                <th>Created</th>
                <th>Status</th>
                <th>Due</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="todo-body"></tbody>
          </table>
        </div>

      </div>


    </div>
    <div id="card-footer">
      <button id="trash">
        <img src="./assets/reshot-icon-trash-ZP5J3CWHL6.svg" alt="trash-icon" id="trash-icon">
      </button>
    </div>
    <div id="github">
      <a href="https://github.com/samglz10/To-Do-List" target="_blank">
        <img src="./assets/github-mark-white.svg" alt="github-link" id="github-link">
      </a>
    </div>
  </div>
  <script src="./script.js"></script>
</body>

</html>
